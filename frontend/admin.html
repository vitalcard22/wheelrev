<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WheelRev — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F6F5F1; --surface:#FFFFFF; --text:#1B1D1F; --mute:#6B6F76;
    --accent:#1E4FD8; --accent-soft:#E8EDFC; --line:#DFDDD5; --danger:#C43D3D; --danger-soft:#FBE9E9;
  }
  *{box-sizing:border-box;}
  body{ margin:0; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; }
  h1,h2,.display{ font-family:'Fraunces',serif; }
  .mono{ font-family:'IBM Plex Mono',monospace; }

  header{ padding:20px 32px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; background:var(--surface); }
  header .logo{ font-size:20px; font-weight:600; }
  header .logo span{ color:var(--accent); }
  header a{ font-size:13px; color:var(--mute); text-decoration:none; }

  .wrap{ max-width:1100px; margin:0 auto; padding:32px; }

  /* GATE */
  #gate{ max-width:380px; margin:80px auto; text-align:center; }
  #gate h2{ font-size:24px; margin-bottom:8px; }
  #gate p{ color:var(--mute); font-size:14px; margin-bottom:24px; }
  #gate input{ width:100%; padding:14px 16px; border:1px solid var(--line); border-radius:10px; font-size:15px; margin-bottom:12px; font-family:inherit; }
  #gate button{ width:100%; padding:14px; border:none; border-radius:10px; background:var(--accent); color:#fff; font-weight:600; font-size:14px; cursor:pointer; font-family:inherit; }
  #gateError{ color:var(--danger); font-size:13px; margin-top:10px; min-height:18px; }

  /* TOOLBAR */
  .tabs{ display:flex; gap:4px; margin-bottom:20px; border-bottom:1px solid var(--line); }
  .tab-btn{
    padding:10px 18px; border:none; background:none; font-family:inherit; font-size:14px; font-weight:600;
    color:var(--mute); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px;
  }
  .tab-btn.active{ color:var(--accent); border-bottom-color:var(--accent); }
  .orders-badge{
    display:inline-block; background:var(--danger); color:#fff; font-size:10px; padding:1px 7px; border-radius:10px; margin-left:4px;
  }
  .order-status{ padding:6px 10px; border-radius:6px; border:1px solid var(--line); font-family:inherit; font-size:12px; background:var(--surface); }
  td.order-msg{ max-width:220px; font-size:12.5px; color:var(--mute); }
  .toolbar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; gap:12px; flex-wrap:wrap; }
  .toolbar input{ padding:10px 14px; border:1px solid var(--line); border-radius:8px; font-family:inherit; font-size:14px; min-width:220px; }
  .btn{ padding:11px 20px; border-radius:8px; border:none; font-weight:600; font-size:13px; cursor:pointer; font-family:inherit; }
  .btn-primary{ background:var(--accent); color:#fff; }
  .btn-secondary{ background:var(--surface); color:var(--text); border:1px solid var(--line); }

  /* TABLE */
  table{ width:100%; border-collapse:collapse; background:var(--surface); border:1px solid var(--line); border-radius:12px; overflow:hidden; }
  th,td{ text-align:left; padding:12px 14px; border-bottom:1px solid var(--line); font-size:13.5px; }
  th{ background:var(--accent-soft); color:var(--accent); font-size:11px; text-transform:uppercase; letter-spacing:.04em; }
  tr:last-child td{ border-bottom:none; }
  td.price{ font-family:'IBM Plex Mono',monospace; }
  .row-actions{ display:flex; gap:8px; }
  .row-actions button{ padding:6px 12px; border-radius:6px; border:1px solid var(--line); background:var(--surface); font-size:12px; cursor:pointer; font-family:inherit; }
  .row-actions button.danger{ color:var(--danger); border-color:var(--danger-soft); }
  .tier-badge{ font-size:10px; padding:3px 8px; border-radius:8px; font-weight:600; }
  .tier-daily{ background:var(--accent-soft); color:var(--accent); }
  .tier-luxury{ background:#F5EBD8; color:#8A6D1F; }

  /* MODAL FORM */
  .modal-overlay{ position:fixed; inset:0; background:rgba(0,0,0,.45); display:none; align-items:center; justify-content:center; z-index:100; padding:20px; }
  .modal-overlay.show{ display:flex; }
  .modal{ background:var(--surface); border-radius:14px; max-width:520px; width:100%; max-height:88vh; overflow-y:auto; padding:28px; }
  .modal h3{ margin:0 0 18px; font-size:20px; }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:12px; color:var(--mute); margin-bottom:5px; text-transform:uppercase; letter-spacing:.03em; }
  .field input, .field select{ width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:8px; font-family:inherit; font-size:14px; }
  .field-row{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .modal-actions{ display:flex; gap:10px; margin-top:20px; }
  .modal-actions button{ flex:1; padding:12px; border-radius:8px; border:none; font-weight:600; cursor:pointer; font-family:inherit; font-size:14px; }
  #formError{ color:var(--danger); font-size:13px; margin-top:8px; min-height:18px; }
  #toast{ position:fixed; bottom:24px; right:24px; background:var(--text); color:#fff; padding:12px 20px; border-radius:8px; font-size:13px; opacity:0; transform:translateY(10px); transition:all .3s ease; pointer-events:none; z-index:200; }
  #toast.show{ opacity:1; transform:translateY(0); }
  .empty-state{ text-align:center; padding:40px; color:var(--mute); }
  .source-tag{ font-size:11px; color:var(--mute); font-family:'IBM Plex Mono',monospace; }
</style>
</head>
<body>

<div id="gate">
  <h2>WheelRev Admin</h2>
  <p>Enter the admin token to manage the inventory.</p>
  <input type="password" id="tokenInput" placeholder="Admin token">
  <button onclick="unlock()">Unlock</button>
  <div id="gateError"></div>
</div>

<div id="adminApp" style="display:none;">
  <header>
    <div class="logo">WheelRev <span>Admin</span></div>
    <a href="index.html">&larr; Back to site</a>
  </header>
  <div class="wrap">
    <div class="tabs">
      <button class="tab-btn active" id="tabCarsBtn" onclick="switchTab('cars')">Cars</button>
      <button class="tab-btn" id="tabOrdersBtn" onclick="switchTab('orders')">Reservations <span id="ordersBadge" class="orders-badge" style="display:none;"></span></button>
    </div>

    <div id="carsTab">
      <div class="toolbar">
        <input type="text" id="searchBox" placeholder="Search by brand or model..." oninput="renderTable()">
        <div style="display:flex; gap:10px; align-items:center;">
          <span class="source-tag" id="sourceTag"></span>
          <button class="btn btn-secondary" onclick="loadCars()">Refresh</button>
          <button class="btn btn-primary" onclick="openForm()">+ Add car</button>
        </div>
      </div>
      <div id="tableWrap"></div>
    </div>

    <div id="ordersTab" style="display:none;">
      <div class="toolbar">
        <span style="font-size:13px; color:var(--mute);">Reservation requests submitted from the site — no payment collected, follow up directly.</span>
        <button class="btn btn-secondary" onclick="loadOrders()">Refresh</button>
      </div>
      <div id="ordersWrap"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">Add car</h3>
    <div class="field-row">
      <div class="field"><label>Brand</label><input id="f_brand"></div>
      <div class="field"><label>Model</label><input id="f_model"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Year</label><input id="f_year" type="number"></div>
      <div class="field"><label>Price (USD)</label><input id="f_price" type="number"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Type</label><input id="f_type" placeholder="Sedan, SUV, Coupe..."></div>
      <div class="field">
        <label>Tier</label>
        <select id="f_tier"><option value="daily">Daily</option><option value="luxury">Luxury</option></select>
      </div>
    </div>
    <div class="field-row">
      <div class="field"><label>Horsepower</label><input id="f_hp" type="number"></div>
      <div class="field"><label>Drivetrain</label><input id="f_drivetrain" placeholder="AWD, RWD, FWD..."></div>
    </div>
    <div class="field"><label>Photo URL</label><input id="f_img" placeholder="https://..."></div>
    <div class="field"><label>Tagline</label><input id="f_tagline"></div>
    <div id="formError"></div>
    <div class="modal-actions">
      <button class="btn-secondary" style="background:var(--bg); border:1px solid var(--line);" onclick="closeForm()">Cancel</button>
      <button class="btn-primary" style="background:var(--accent); color:#fff;" onclick="saveCar()">Save</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API_BASE = 'https://wheelrev-backend.fly.dev/api';
let adminToken = '';
let cars = [];
let editingId = null;

function unlock(){
  const t = document.getElementById('tokenInput').value.trim();
  if(!t){ document.getElementById('gateError').textContent = 'Enter a token.'; return; }
  adminToken = t;
  sessionStorage.setItem('wheelrev_admin_token', t);
  document.getElementById('gate').style.display = 'none';
  document.getElementById('adminApp').style.display = 'block';
  loadCars();
  checkNewOrdersBadge();
}

// auto-unlock if already entered this session
const savedToken = sessionStorage.getItem('wheelrev_admin_token');
if(savedToken){
  adminToken = savedToken;
  window.addEventListener('DOMContentLoaded', ()=>{
    document.getElementById('gate').style.display = 'none';
    document.getElementById('adminApp').style.display = 'block';
    loadCars();
    checkNewOrdersBadge();
  });
}

function switchTab(tab){
  document.getElementById('carsTab').style.display = tab==='cars' ? 'block' : 'none';
  document.getElementById('ordersTab').style.display = tab==='orders' ? 'block' : 'none';
  document.getElementById('tabCarsBtn').classList.toggle('active', tab==='cars');
  document.getElementById('tabOrdersBtn').classList.toggle('active', tab==='orders');
  if(tab==='orders') loadOrders();
}

let orders = [];
async function loadOrders(){
  document.getElementById('ordersWrap').innerHTML = '<div class="empty-state">Loading...</div>';
  try{
    const res = await fetch(`${API_BASE}/orders`, {headers:{'x-admin-token': adminToken}});
    const json = await res.json();
    if(!res.ok){
      document.getElementById('ordersWrap').innerHTML = `<div class="empty-state">${json.error || 'Could not load reservations.'}</div>`;
      return;
    }
    orders = json.orders;
    renderOrders();
  } catch(err){
    document.getElementById('ordersWrap').innerHTML = '<div class="empty-state">Could not reach the backend.</div>';
  }
}

function renderOrders(){
  const wrap = document.getElementById('ordersWrap');
  if(!orders.length){
    wrap.innerHTML = '<div class="empty-state">No reservation requests yet.</div>';
    return;
  }
  wrap.innerHTML = `<table>
    <tr><th>Date</th><th>Customer</th><th>Contact</th><th>Car</th><th>Price</th><th>Financing</th><th>Message</th><th>Status</th></tr>
    ${orders.map(o => `
      <tr>
        <td>${new Date(o.created_at).toLocaleDateString()}</td>
        <td>${o.customer_name}</td>
        <td>${o.customer_email}${o.customer_phone ? '<br>'+o.customer_phone : ''}</td>
        <td>${o.car_brand} ${o.car_model}</td>
        <td class="price">$${(o.car_price||0).toLocaleString('en-US')}</td>
        <td>${o.financing_pref || '—'}</td>
        <td class="order-msg">${o.message || '—'}</td>
        <td><select class="order-status" onchange="updateOrderStatus(${o.id}, this.value)">
          ${['new','contacted','closed','cancelled'].map(s=>`<option value="${s}" ${o.status===s?'selected':''}>${s}</option>`).join('')}
        </select></td>
      </tr>
    `).join('')}
  </table>`;
}

async function updateOrderStatus(id, status){
  try{
    const res = await fetch(`${API_BASE}/orders/${id}`, {
      method:'PUT',
      headers:{'Content-Type':'application/json', 'x-admin-token': adminToken},
      body: JSON.stringify({status})
    });
    if(!res.ok){ showToast('Could not update status.'); return; }
    showToast('Status updated.');
    checkNewOrdersBadge();
  } catch(err){
    showToast('Could not reach the backend.');
  }
}

async function checkNewOrdersBadge(){
  try{
    const res = await fetch(`${API_BASE}/orders`, {headers:{'x-admin-token': adminToken}});
    const json = await res.json();
    if(!res.ok) return;
    const newCount = json.orders.filter(o=>o.status==='new').length;
    const badge = document.getElementById('ordersBadge');
    if(newCount > 0){ badge.textContent = newCount; badge.style.display = 'inline-block'; }
    else { badge.style.display = 'none'; }
  } catch(err){ /* silent — badge just won't show */ }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

async function loadCars(){
  document.getElementById('tableWrap').innerHTML = '<div class="empty-state">Loading...</div>';
  try{
    const res = await fetch(`${API_BASE}/cars`);
    const json = await res.json();
    cars = json.cars;
    document.getElementById('sourceTag').textContent = `source: ${json.source}`;
    renderTable();
  } catch(err){
    document.getElementById('tableWrap').innerHTML = `<div class="empty-state">Could not reach the backend at ${API_BASE}. Is it running?</div>`;
  }
}

function renderTable(){
  const q = document.getElementById('searchBox').value.toLowerCase();
  const filtered = cars.filter(c => !q || c.brand.toLowerCase().includes(q) || c.model.toLowerCase().includes(q));
  const wrap = document.getElementById('tableWrap');
  if(!filtered.length){
    wrap.innerHTML = '<div class="empty-state">No cars match.</div>';
    return;
  }
  wrap.innerHTML = `<table>
    <tr><th>Brand</th><th>Model</th><th>Year</th><th>Tier</th><th>Price</th><th></th></tr>
    ${filtered.map(c => `
      <tr>
        <td>${c.brand}</td>
        <td>${c.model}</td>
        <td>${c.year || '—'}</td>
        <td><span class="tier-badge tier-${c.tier}">${c.tier}</span></td>
        <td class="price">$${(c.price||0).toLocaleString('en-US')}</td>
        <td class="row-actions">
          <button onclick="openForm('${c.id}')">Edit</button>
          <button class="danger" onclick="deleteCar('${c.id}')">Delete</button>
        </td>
      </tr>
    `).join('')}
  </table>`;
}

function openForm(id){
  editingId = id || null;
  document.getElementById('formError').textContent = '';
  const c = id ? cars.find(x=>x.id===id) : null;
  document.getElementById('modalTitle').textContent = id ? `Edit ${c.brand} ${c.model}` : 'Add car';
  document.getElementById('f_brand').value = c?.brand || '';
  document.getElementById('f_model').value = c?.model || '';
  document.getElementById('f_year').value = c?.year || 2025;
  document.getElementById('f_price').value = c?.price || '';
  document.getElementById('f_type').value = c?.type || '';
  document.getElementById('f_tier').value = c?.tier || 'daily';
  document.getElementById('f_hp').value = c?.hp || '';
  document.getElementById('f_drivetrain').value = c?.drivetrain || '';
  document.getElementById('f_img').value = c?.img || '';
  document.getElementById('f_tagline').value = c?.tagline || '';
  document.getElementById('modalOverlay').classList.add('show');
}
function closeForm(){
  document.getElementById('modalOverlay').classList.remove('show');
}

function slugify(brand, model){
  return (brand + '-' + model).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
}

async function saveCar(){
  const payload = {
    brand: document.getElementById('f_brand').value.trim(),
    model: document.getElementById('f_model').value.trim(),
    year: Number(document.getElementById('f_year').value) || null,
    price: Number(document.getElementById('f_price').value),
    type: document.getElementById('f_type').value.trim(),
    tier: document.getElementById('f_tier').value,
    hp: Number(document.getElementById('f_hp').value) || null,
    drivetrain: document.getElementById('f_drivetrain').value.trim(),
    img: document.getElementById('f_img').value.trim(),
    gallery: document.getElementById('f_img').value.trim() ? [document.getElementById('f_img').value.trim()] : [],
    tagline: document.getElementById('f_tagline').value.trim(),
  };
  if(!payload.brand || !payload.model || !payload.price){
    document.getElementById('formError').textContent = 'Brand, model, and price are required.';
    return;
  }

  const isEdit = !!editingId;
  const id = isEdit ? editingId : slugify(payload.brand, payload.model) + '-' + Date.now().toString(36);
  if(!isEdit) payload.id = id;

  try{
    const res = await fetch(`${API_BASE}/cars${isEdit ? '/' + id : ''}`, {
      method: isEdit ? 'PUT' : 'POST',
      headers: {'Content-Type':'application/json', 'x-admin-token': adminToken},
      body: JSON.stringify(payload)
    });
    const json = await res.json();
    if(!res.ok){
      document.getElementById('formError').textContent = json.error || 'Something went wrong.';
      return;
    }
    closeForm();
    showToast(isEdit ? 'Car updated.' : 'Car added.');
    loadCars();
  } catch(err){
    document.getElementById('formError').textContent = 'Could not reach the backend.';
  }
}

async function deleteCar(id){
  const c = cars.find(x=>x.id===id);
  if(!confirm(`Delete ${c.brand} ${c.model}? This can't be undone.`)) return;
  try{
    const res = await fetch(`${API_BASE}/cars/${id}`, {
      method: 'DELETE',
      headers: {'x-admin-token': adminToken}
    });
    const json = await res.json();
    if(!res.ok){ showToast(json.error || 'Delete failed.'); return; }
    showToast('Car deleted.');
    loadCars();
  } catch(err){
    showToast('Could not reach the backend.');
  }
}
</script>
</body>
</html>
